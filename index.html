<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversor XML para Excel</title>
    <meta name="description" content="Converta seus arquivos XML para planilhas Excel formatadas" />
    <meta property="og:title" content="Conversor XML para Excel" />
    <meta property="og:description" content="Converta seus arquivos XML para planilhas Excel formatadas" />
    <meta property="og:image" content="/og-image.png" />
    <!-- Preload de recursos críticos -->
    <link rel="preconnect" href="https://npnkmbflfflqpjwhxbfu.supabase.co" />
    <link rel="preconnect" href="https://promobconverter.lovable.ai" />
    <!-- Fallback para caso de erro -->
    <style>
      #root:empty {
        display: none;
      }
      #loading-fallback {
        display: none;
      }
      #root:empty + #loading-fallback {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        text-align: center;
        padding: 2rem;
      }
      .spinner {
        border: 4px solid rgba(0, 0, 0, 0.1);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border-left-color: #2563eb;
        animation: spin 1s linear infinite;
        margin: 0 auto 1.5rem;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  
  <body>
    <div id="root"></div>
    <!-- Fallback para caso de erro -->
    <div id="loading-fallback">
      <div class="spinner"></div>
      <h2>Carregando aplicação...</h2>
      <p>Se a página não carregar em alguns segundos, <a href="javascript:window.location.reload()">clique aqui para recarregar</a>.</p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Script para detectar erros de carregamento -->
    <script>
      // Se a aplicação não carregar em 10 segundos, mostrar mensagem de erro
      setTimeout(() => {
        const root = document.getElementById('root');
        if (!root || !root.hasChildNodes()) {
          const fallback = document.getElementById('loading-fallback');
          if (fallback) {
            fallback.innerHTML = `
              <h2 style="color: #dc2626;">Erro ao carregar a aplicação</h2>
              <p>Não foi possível carregar a aplicação corretamente.</p>
              <button onclick="window.location.reload()" style="background-color: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">
                Tentar novamente
              </button>
              <p style="margin-top: 20px;">
                <a href="/debug" style="color: #2563eb;">Ir para página de diagnóstico</a>
              </p>
            `;
          }
        }
      }, 10000);
    </script>
  </body>
</html>
